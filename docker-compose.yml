services:
  scanner:
    image: ${SCANNER_IMAGE:?set SCANNER_IMAGE in .env.server}
    container_name: arb-arbitrage-scanner
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
