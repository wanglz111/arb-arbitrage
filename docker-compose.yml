services:
  scanner:
    image: ${SCANNER_IMAGE:-ghcr.io/wanglz111/arb-arbitrage:latest}
    container_name: arb-arbitrage-scanner
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
